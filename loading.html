<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciando...</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-app-region: drag;
        user-select: none;
      }

      body {
        background: #121212;
        color: #f5f5f5;
        font-family:
          "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      .logo {
        font-size: 5rem;
        margin-bottom: 16px;
        animation: flotando 3s ease-in-out infinite;
      }

      @keyframes flotando {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .nombre {
        font-size: 2.2rem;
        font-weight: 800;
        color: #ff9800;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      .subtitulo {
        font-size: 0.95rem;
        color: #666;
        margin-bottom: 48px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .barra-wrap {
        width: 280px;
        height: 4px;
        background: #2a2a2a;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .barra {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff9800, #ffb74d);
        border-radius: 2px;
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .estado {
        font-size: 0.85rem;
        color: #555;
        min-height: 20px;
        transition: opacity 0.3s;
        letter-spacing: 0.03em;
      }

      .puntos::after {
        content: "";
        animation: puntos 1.4s steps(4, end) infinite;
      }

      @keyframes puntos {
        0% {
          content: "";
        }
        25% {
          content: ".";
        }
        50% {
          content: "..";
        }
        75% {
          content: "...";
        }
      }

      .version {
        position: fixed;
        bottom: 20px;
        font-size: 0.75rem;
        color: #333;
      }
      .logo img {
        width: 130px;
        height: 130px;
        object-fit: contain;
        border-radius: 50%;
        animation: flotando 3s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <img
        src="assets/icon.png"
        alt="Ebi Ball"
        onerror="this.parentElement.textContent = '🍣'"
      />
    </div>
    <div class="nombre" id="nombre">Ebi Ball</div>
    <div class="subtitulo">Bolas de Arroz, Sushi &amp; Boneless</div>

    <div class="barra-wrap">
      <div class="barra" id="barra"></div>
    </div>
    <div class="estado" id="estado">
      <span class="puntos">Iniciando</span>
    </div>

    <div class="version" id="version">v1.0.0</div>

    <script>
      // Called from main process via executeJavaScript
      function setStatus(msg) {
        const el = document.getElementById("estado");
        el.style.opacity = "0";
        setTimeout(() => {
          el.textContent = msg;
          el.style.opacity = "1";
        }, 150);
      }

      function setProgress(pct) {
        document.getElementById("barra").style.width = pct + "%";
      }

      function setNombre(nombre) {
        document.getElementById("nombre").textContent = nombre;
      }

      function setVersion(v) {
        document.getElementById("version").textContent = "v" + v;
      }
    </script>
  </body>
</html>
