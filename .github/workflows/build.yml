name: Build y Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Instalar dependencias Electron
        run: npm install

      - name: Instalar Python y dependencias
        run: |
          pip install -r python-backend/requirements.txt
          pip install pyinstaller

      - name: Construir servidor Flask y print-bridge (PyInstaller)
        run: scripts\build-server.bat

      - name: Construir jar de inventario (Maven)
        run: |
          cd java-services/inventory-service
          mvn package -DskipTests -q

      - name: Crear JRE mínimo con jlink
        shell: pwsh
        run: |
          $jlink = "$env:JAVA_HOME\bin\jlink.exe"
          & $jlink `
            --add-modules java.se,jdk.unsupported `
            --output java-services/inventory-service/jre `
            --compress=2 `
            --no-header-files `
            --no-man-pages `
            --strip-debug

      - name: Construir e instalar app Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build-win -- --publish always

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Instalar dependencias Electron
        run: npm install

      - name: Instalar Python y dependencias
        run: |
          pip3 install -r python-backend/requirements.txt
          pip3 install pyinstaller

      - name: Construir servidor Flask y print-bridge (PyInstaller)
        run: bash scripts/build-server.sh

      - name: Construir jar de inventario (Maven)
        run: |
          cd java-services/inventory-service
          mvn package -DskipTests -q

      - name: Crear JRE mínimo con jlink
        run: |
          $JAVA_HOME/bin/jlink \
            --add-modules java.se,jdk.unsupported \
            --output java-services/inventory-service/jre \
            --compress=2 \
            --no-header-files \
            --no-man-pages \
            --strip-debug

      - name: Construir e instalar app macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build-mac -- --publish always
